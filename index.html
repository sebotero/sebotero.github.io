document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

c-if>\n    <\u002Fbutton>\n    <button onclick=\"{{ toggleMenu }}\" aria-label=\"Menu\" aria-expanded=\"{{ menuAria }}\" style=\"background:none;border:none;padding:10px;cursor:pointer;display:flex;flex-direction:column;gap:5px;\">\n      <span style=\"display:block;width:22px;height:2px;background:var(--ink,#1a1a1c);border-radius:2px;transition:transform .25s ease;transform:{{ line1 }};\"><\u002Fspan>\n      <span style=\"display:block;width:22px;height:2px;background:var(--ink,#1a1a1c);border-radius:2px;transition:opacity .18s ease;opacity:{{ line2op }};\"><\u002Fspan>\n      <span style=\"display:block;width:22px;height:2px;background:var(--ink,#1a1a1c);border-radius:2px;transition:transform .25s ease;transform:{{ line3 }};\"><\u002Fspan>\n    <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n  <div class=\"m-scrim\" onclick=\"{{ closeMenu }}\" aria-hidden=\"true\" style=\"position:fixed;inset:0;z-index:58;background:rgba(24,21,16,0.22);opacity:{{ menuOpacity }};pointer-events:{{ menuPointer }};transition:opacity .25s ease;\"><\u002Fdiv>\n  <nav class=\"m-mobmenu\" aria-label=\"Sections\" style=\"position:fixed;top:62px;right:14px;left:auto;z-index:59;width:min(264px,74vw);background:var(--surface,#fffdf9);border:1px solid var(--hair,#ece6d9);border-radius:14px;box-shadow:0 16px 38px -20px rgba(40,34,24,0.34);padding:7px;transform-origin:top right;opacity:{{ menuOpacity }};transform:{{ menuTransform }};pointer-events:{{ menuPointer }};transition:opacity .22s ease,transform .26s cubic-bezier(.2,.8,.2,1);\">\n    <sc-for list=\"{{ mobNavItems }}\" as=\"n\" hint-placeholder-count=\"5\">\n      <a href=\"{{ n.href }}\" onclick=\"{{ closeMenu }}\" class=\"m-menuitem\" style=\"display:block;padding:12px 14px;border-radius:9px;font-size:16.5px;letter-spacing:-0.01em;font-weight:{{ n.menuWeight }};color:{{ n.menuColor }};transition:background .15s ease,color .15s ease;\">{{ n.label }}<\u002Fa>\n    <\u002Fsc-for>\n  <\u002Fnav>\n\n  <!-- Sidebar -->\n  <aside class=\"m-aside\" style=\"position:sticky;top:0;height:100vh;overflow-y:auto;background:var(--surface,#f6f2ea);border-right:1px solid var(--hair,#ece6d9);padding:36px 38px;display:flex;flex-direction:column;gap:22px;\">\n    <div style=\"flex-shrink:0;\">\n      <h1 class=\"m-aside-name\" style=\"color:var(--name,#1a1a1c);font-size:29px;font-weight:600;letter-spacing:-0.02em;line-height:1.08;margin-bottom:11px;\"><a href=\"https://sebotero.github.io\" style=\"color:inherit;text-decoration:none;\">Sebastián Otero<\u002Fa><\u002Fh1>\n      <p style=\"font-size:15px;line-height:1.5;color:var(--muted,#86837c);font-weight:400;\">Assistant Professor<br>Department of Economics<br><span style=\"color:var(--ink,#1a1a1c);font-weight:400;\">Columbia University<\u002Fspan><\u002Fp>\n      <div style=\"margin-top:13px;padding-top:13px;border-top:1px solid var(--hair,#e6dfd0);display:flex;flex-direction:column;gap:5px;font-size:14px;line-height:1.4;color:var(--muted,#86837c);\">\n        <div>Faculty Research Fellow, <span style=\"color:var(--ink,#42403a);\">NBER<\u002Fspan><\u002Fdiv>\n        <div>Research Affiliate, <span style=\"color:var(--ink,#42403a);\">IZA<\u002Fspan><\u002Fdiv>\n        <div>PhD in Economics, <span style=\"color:var(--ink,#42403a);\">Stanford<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"m-photo\" style=\"border-radius:7px;overflow:hidden;flex:0 1 auto;height:280px;min-height:180px;\">\n      <img src=\"aac046ad-da97-4121-859b-677d919eff4e\" alt=\"Sebastián Otero\" style=\"width:100%;height:100%;object-fit:cover;object-position:center 35%;display:block;\">\n    <\u002Fdiv>\n\n    <nav class=\"m-aside-nav\" aria-label=\"Sections\" style=\"display:flex;flex-direction:column;gap:12px;font-size:16.5px;flex-shrink:0;margin-top:14px;\">\n      <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"4\">\n        <a href=\"{{ n.href }}\" class=\"m-nav\" aria-current=\"{{ n.current }}\" style=\"color:{{ n.color }};font-weight:{{ n.weight }};align-self:flex-start;\" style-hover=\"color:var(--accent,#2f5fb0);\"><span style=\"border-bottom:1.5px solid {{ n.tick }};padding-bottom:2px;transition:border-color .2s ease;\">{{ n.label }}<\u002Fspan><\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <div style=\"flex:1 1 auto;min-height:20px;\"><\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:14px;font-size:13px;color:var(--faint,#b3afa4);flex-shrink:0;padding-top:18px;border-top:1px solid var(--hair,#e8e4d8);\">\n      <span>Updated {{ updated }}<\u002Fspan>\n      <button onclick=\"{{ toggleMode }}\" class=\"m-copy\" style=\"background:none;border:none;padding:0;font:inherit;cursor:pointer;\">{{ modeLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- Content -->\n  <main id=\"maincontent\" class=\"m-main\" style=\"padding:64px clamp(28px,5vw,84px) 36px;max-width:880px;display:flex;flex-direction:column;\">\n\n    <!-- Mobile-only hero (distinct compact layout for small screens) -->\n    <div class=\"m-mhero\" style=\"display:none;margin-bottom:34px;\">\n      <sc-if value=\"{{ photoTop }}\" hint-placeholder-val=\"{{ true }}\"><img src=\"aac046ad-da97-4121-859b-677d919eff4e\" alt=\"Sebastián Otero\" style=\"{{ photoStyle }}\"><\u002Fsc-if>\n      <p style=\"font-size:17.5px;line-height:1.55;color:var(--stmt,#4d493f);\">I'm an Assistant Professor of Economics at Columbia University. I'm also a Faculty Research Fellow at NBER and a Research Affiliate at IZA. I completed my PhD at Stanford and spent a year as a postdoctoral researcher at UC Berkeley.<\u002Fp>\n            <p style=\"font-size:17.5px;line-height:1.55;color:var(--stmt,#4d493f);margin-top:16px;\">My research studies education and labor markets. I combine structural models of firm and consumer behavior with causal inference to identify the effects of regulation, technology, and competition.<\u002Fp>\n      <sc-if value=\"{{ photoAboveEmail }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"aac046ad-da97-4121-859b-677d919eff4e\" alt=\"Sebastián Otero\" style=\"{{ photoStyle }}\"><\u002Fsc-if>\n      <button onclick=\"{{ copyEmail }}\" class=\"m-copy\" title=\"Tap to copy\" style=\"background:none;border:none;padding:0;font:inherit;cursor:pointer;display:block;margin-top:28px;font-size:14.5px;font-weight:500;color:{{ emailColor }};\">{{ emailLabel }}<\u002Fbutton>\n      <div style=\"display:flex;gap:18px;margin-top:11px;font-size:14px;\">\n        <a href=\"https://sebotero.github.io/cv/cv_sebastian_otero.pdf\" target=\"_blank\" rel=\"noopener\" class=\"m-link\">CV<\u002Fa>\n        <a href=\"https://scholar.google.com/citations?user=qGak9VMAAAAJ&amp;hl=en\" target=\"_blank\" rel=\"noopener\" class=\"m-link\">Scholar<\u002Fa>\n        <a href=\"https://www.linkedin.com/in/sebotero/\" target=\"_blank\" rel=\"noopener\" class=\"m-link\">LinkedIn<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"m-mobrule\" style=\"display:none;height:1px;background:var(--hair,#ece6d9);margin:0 0 30px;\"><\u002Fdiv>\n\n    <div class=\"print-header\">\n      <div style=\"font-size:22px;font-weight:700;\">Sebastián Otero<\u002Fdiv>\n      <div style=\"font-size:14px;color:#000;margin-top:2px;\">Assistant Professor, Department of Economics, Columbia University · so2699@columbia.edu · sebotero.github.io<\u002Fdiv>\n    <\u002Fdiv>\n\n    <section class=\"m-intro\" style=\"margin-bottom:62px;max-width:60ch;\">\n      <p class=\"m-statement\" style=\"font-size:clamp(18px,2vw,23px);line-height:1.55;font-weight:400;letter-spacing:-0.01em;color:var(--stmt,#4d493f);\">My research studies education and labor markets. I combine structural models of firm and consumer behavior with causal inference to identify the effects of regulation, technology, and competition.<\u002Fp>\n      <div class=\"m-contact-row\" style=\"display:flex;flex-wrap:wrap;align-items:baseline;gap:16px;margin-top:30px;font-size:15px;color:var(--muted,#86837c);\">\n        <button onclick=\"{{ copyEmail }}\" class=\"m-copy\" title=\"Click to copy\" style=\"background:none;border:none;padding:0;font:inherit;cursor:pointer;font-weight:500;color:{{ emailColor }};margin-right:6px;\" style-hover=\"text-decoration:underline;text-underline-offset:3px;\">{{ emailLabel }}<\u002Fbutton>\n        <a href=\"https://sebotero.github.io/cv/cv_sebastian_otero.pdf\" target=\"_blank\" rel=\"noopener\" style-hover=\"color:var(--accent,#1f4f8f);text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px;\">CV<\u002Fa>\n        <a href=\"https://scholar.google.com/citations?user=qGak9VMAAAAJ&amp;hl=en\" target=\"_blank\" rel=\"noopener\" style-hover=\"color:var(--accent,#1f4f8f);text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px;\">Scholar<\u002Fa>\n        <a href=\"https://www.linkedin.com/in/sebotero/\" target=\"_blank\" rel=\"noopener\" style-hover=\"color:var(--accent,#1f4f8f);text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px;\">LinkedIn<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <sc-for list=\"{{ sections }}\" as=\"s\" hint-placeholder-count=\"3\">\n      <section id=\"{{ s.id }}\" style=\"margin-bottom:60px;scroll-margin-top:30px;\">\n        <h2 style=\"font-size:13px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--faint,#b0ada4);margin-bottom:8px;\">{{ s.label }}<\u002Fh2>\n\n        <sc-for list=\"{{ s.groups }}\" as=\"g\" hint-placeholder-count=\"1\">\n          <sc-if value=\"{{ g.hasSub }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:13.5px;font-weight:500;color:var(--muted,#86837c);margin:30px 0 4px;\">{{ g.sub }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-for list=\"{{ g.papers }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <article class=\"m-row\" style=\"padding:24px 0;border-bottom:1px solid var(--hair,#ece6d9);\">\n              <h3 style=\"color:var(--ink,#1a1a1c);font-size:19px;line-height:1.38;font-weight:500;letter-spacing:-0.008em;margin-bottom:7px;\">\n                <sc-if value=\"{{ p.hasTitleLink }}\" hint-placeholder-val=\"{{ false }}\"><a href=\"{{ p.url }}\" target=\"_blank\" rel=\"noopener\" class=\"m-title-link\" style=\"border-bottom:1px solid var(--hair,#e2e0da);\" style-hover=\"color:var(--accent,#2f5fb0);border-bottom-color:var(--accent,#2f5fb0);\">{{ p.title }}<\u002Fa><\u002Fsc-if>\n                <sc-if value=\"{{ p.noTitleLink }}\" hint-placeholder-val=\"{{ true }}\">{{ p.title }}<\u002Fsc-if>\n              <\u002Fh3>\n              <sc-if value=\"{{ p.hasAuthors }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-size:16px;color:var(--muted,#6f6c65);margin-bottom:8px;\">with <sc-for list=\"{{ p.authors }}\" as=\"a\"><sc-if value=\"{{ a.isLink }}\" hint-placeholder-val=\"{{ true }}\"><a href=\"{{ a.url }}\" target=\"_blank\" rel=\"noopener\" class=\"m-authlink\" style=\"color:var(--ink,#42403a);\" style-hover=\"color:var(--accent,#2f5fb0);text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px;\">{{ a.name }}<\u002Fa><\u002Fsc-if><sc-if value=\"{{ a.isText }}\" hint-placeholder-val=\"{{ false }}\"><span>{{ a.name }}<\u002Fspan><\u002Fsc-if>{{ a.sep }}<\u002Fsc-for><\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ p.hasJournal }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:16px;color:var(--ink,#42403a);\"><span style=\"font-style:italic;\">{{ p.journal.name }}<\u002Fspan>{{ p.journal.rest }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ p.hasStatus }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:15px;color:var(--muted,#9a978f);\">{{ p.statusDate }} {{ p.statusText }}<sc-if value=\"{{ p.hasStatusJournal }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-style:italic;font-weight:700;color:var(--ink,#33312b);\">{{ p.statusJournal }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ p.hasStatusAward }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-style:italic;\">{{ p.statusAward }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ p.hasNote }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:15px;color:var(--muted,#9a978f);font-style:italic;\">{{ p.note }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ p.hasLinkRow }}\" hint-placeholder-val=\"{{ true }}\">\n                <div class=\"m-links\" style=\"display:flex;flex-wrap:wrap;gap:18px;margin-top:11px;font-size:14px;\">\n                  <sc-if value=\"{{ p.hasAbstract }}\" hint-placeholder-val=\"{{ true }}\">\n                    <button class=\"m-link\" onclick=\"{{ p.toggle }}\" aria-expanded=\"{{ p.ariaOpen }}\" style=\"cursor:pointer;background:none;border:none;padding:0;font:inherit;color:{{ p.toggleColor }};\">{{ p.toggleLabel }}<\u002Fbutton>\n                  <\u002Fsc-if>\n                  <sc-for list=\"{{ p.links }}\" as=\"l\"><a href=\"{{ l.url }}\" target=\"_blank\" rel=\"noopener\" class=\"m-link\">{{ l.label }}<\u002Fa><\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ p.hasAbstract }}\" hint-placeholder-val=\"{{ false }}\">\n                <div class=\"m-abs\" style=\"display:grid;grid-template-rows:{{ p.rows }};transition:grid-template-rows .32s ease;\">\n                  <div style=\"overflow:hidden;\">\n                    <p class=\"m-abs-inner\" style=\"margin-top:14px;padding-left:16px;border-left:2px solid var(--hair,#e2e0da);font-size:16px;line-height:1.65;color:var(--muted,#5a574f);max-width:62ch;opacity:{{ p.absOpacity }};\">{{ p.abstract }}<\u002Fp>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Farticle>\n          <\u002Fsc-for>\n        <\u002Fsc-for>\n      <\u002Fsection>\n    <\u002Fsc-for>\n\n    <footer style=\"font-size:13px;color:var(--faint,#b0ada4);padding-top:40px;\">\n      © 2026 Sebastián Otero · New York, NY\n    <\u002Ffooter>\n  <\u002Fmain>\n\n  <!-- Research assistant chat -->\n  <button onclick=\"{{ toggleChat }}\" class=\"m-bot\" aria-label=\"Ask me anything\" title=\"Ask me anything\" style=\"position:fixed;right:22px;bottom:22px;z-index:80;display:{{ botBtnDisplay }};align-items:center;justify-content:center;width:54px;height:54px;background:var(--accent,#1f4f8f);color:#fff;border:none;border-radius:50%;cursor:pointer;box-shadow:0 12px 30px -8px rgba(15,23,45,0.45);transition:filter .15s ease;\">\n    <svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z\"><\u002Fpath><\u002Fsvg>\n  <\u002Fbutton>\n\n  <div class=\"m-botpanel\" style=\"display:{{ chatPanelDisplay }};position:fixed;right:22px;bottom:22px;z-index:81;flex-direction:column;width:min(390px,94vw);height:min(560px,76vh);background:var(--surface,#f6f2ea);border:1px solid var(--hair,#ece6d9);border-radius:18px;box-shadow:0 26px 60px -18px rgba(18,22,40,0.5);overflow:hidden;\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--hair,#ece6d9);flex-shrink:0;\">\n      <div>\n        <div style=\"font-size:15px;font-weight:600;color:var(--ink,#1a1a1c);letter-spacing:-0.01em;\">Research assistant<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:var(--muted,#86837c);margin-top:2px;\">Ask about Sebastián's work<\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ closeChat }}\" aria-label=\"Close\" style=\"background:none;border:none;cursor:pointer;color:var(--muted,#86837c);padding:6px;display:flex;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n    <\u002Fdiv>\n    <div ref=\"{{ msgScrollRef }}\" style=\"flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;\">\n      <sc-if value=\"{{ chatEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <p style=\"font-size:14px;line-height:1.6;color:var(--muted,#6f6c65);margin-bottom:14px;\">Hi! I can answer questions about Sebastián's research — his papers, methods, and findings. Try one of these:<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <sc-for list=\"{{ suggested }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ s.ask }}\" class=\"m-suggest\" style=\"text-align:left;background:var(--menuhover,rgba(120,113,98,0.10));border:1px solid var(--hair,#ece6d9);border-radius:11px;padding:10px 13px;font:inherit;font-size:13.5px;line-height:1.4;color:var(--ink,#1a1a1c);cursor:pointer;transition:border-color .15s ease;\">{{ s.q }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-for list=\"{{ chatMsgs }}\" as=\"m\" hint-placeholder-count=\"0\">\n        <div style=\"{{ m.rowStyle }}\"><div style=\"{{ m.bubbleStyle }}\">{{ m.text }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fsc-for>\n      <sc-if value=\"{{ chatLoading }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;justify-content:flex-start;\"><div style=\"background:var(--menuhover,rgba(120,113,98,0.10));border-radius:15px 15px 15px 5px;padding:12px 15px;\"><span class=\"m-dot\"><\u002Fspan><span class=\"m-dot\"><\u002Fspan><span class=\"m-dot\"><\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ chatError }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;justify-content:flex-start;\">\n          <button onclick=\"{{ retryLast }}\" class=\"m-suggest\" style=\"display:inline-flex;align-items:center;gap:7px;background:none;border:1px solid var(--accent,#1f4f8f);color:var(--accent,#1f4f8f);border-radius:999px;padding:7px 14px;font:inherit;font-size:13px;font-weight:500;cursor:pointer;\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 1 0 3-6.7L3 8\"><\u002Fpath><path d=\"M3 3v5h5\"><\u002Fpath><\u002Fsvg>\n            Try again\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:8px;align-items:center;padding:12px;border-top:1px solid var(--hair,#ece6d9);flex-shrink:0;\">\n      <input ref=\"{{ inputRef }}\" onkeydown=\"{{ onChatKey }}\" placeholder=\"Ask a question…\" aria-label=\"Ask a question\" style=\"flex:1;background:var(--bg,#faf7f1);border:1px solid var(--hair,#ece6d9);border-radius:10px;padding:10px 12px;font:inherit;font-size:14px;color:var(--ink,#1a1a1c);outline:none;min-width:0;\">\n      <button onclick=\"{{ submitChat }}\" aria-label=\"Send\" style=\"background:var(--accent,#1f4f8f);color:#fff;border:none;border-radius:10px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;flex-shrink:0;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m22 2-7 20-4-9-9-4Z\"><\u002Fpath><path d=\"M22 2 11 13\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"font-size:11px;color:var(--faint,#b0ada4);text-align:center;padding:0 12px 10px;\">AI-generated · may be imperfect<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#1f4f8f&quot;,&quot;options&quot;:[&quot;#1f3a8a&quot;,&quot;#2b6b5b&quot;,&quot;#9a3b4f&quot;,&quot;#1f4f8f&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;comfortable&quot;,&quot;options&quot;:[&quot;comfortable&quot;,&quot;compact&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;updated&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;June 2026&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;mobilePhotoPos&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;top&quot;,&quot;options&quot;:[&quot;top&quot;,&quot;above email&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Mobile photo&quot;},&quot;mobilePhotoAlign&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;center&quot;,&quot;options&quot;:[&quot;left&quot;,&quot;center&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Mobile photo&quot;},&quot;mobilePhotoSize&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:220,&quot;min&quot;:110,&quot;max&quot;:220,&quot;step&quot;:2,&quot;unit&quot;:&quot;px&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Mobile photo&quot;}}\">\nclass Component extends DCLogic {\n  state = { sections: [], openIds: {}, activeId: 'publications', copied: false, menuOpen: false, mode: 'light', chatOpen: false, chatMessages: [], chatLoading: false, chatError: false };\n\n  componentDidMount() {\n    try {\n      const saved = localStorage.getItem('otero-mode');\n      if (saved === 'dark' || saved === 'light') {\n        // Visitor made an explicit choice before — respect it.\n        this.state.mode = saved;\n      } else {\n        // No saved preference: auto-pick by local time of day.\n        // Dark in the evening/night (7pm–7am), light during the day.\n        const h = new Date().getHours();\n        this.state.mode = (h >= 19 || h < 7) ? 'dark' : 'light';\n      }\n    } catch (e) {}\n    const load = () => {\n      const D = (typeof window !== 'undefined') && window.__OTERO_DATA;\n      if (D && D.buildSections) {\n        this.setState({ sections: D.buildSections() });\n      } else {\n        this._loadT = setTimeout(load, 30);\n      }\n    };\n    load();\n    this.applyTheme();\n  }\n\n  componentDidUpdate() {\n    this.applyTheme();\n    if (!this._scrollBound && this.state.sections.length) this.attachSpy();\n    if (this.state.chatOpen && this._msgScroll) this._msgScroll.scrollTop = this._msgScroll.scrollHeight;\n  }\n\n  componentWillUnmount() {\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    if (this._ct) clearTimeout(this._ct);\n    if (this._loadT) clearTimeout(this._loadT);\n  }\n\n  applyTheme() {\n    const root = document.getElementById('m-root');\n    if (!root) return;\n    root.setAttribute('data-density', this.props.density || 'comfortable');\n    const dark = this.state.mode === 'dark';\n    root.style.setProperty('--accent', dark ? '#E8587E' : (this.props.accent || '#1f4f8f'));\n    root.style.setProperty('--name', dark ? '#D4285B' : '#1a1a1c');\n    const P = dark\n      ? { bg: '#15161a', surface: '#1d1f25', hair: 'rgba(255,255,255,0.11)', ink: '#eceae4', muted: '#a7a39a', faint: '#8f8a82', stmt: '#cbc6bc', menuhover: 'rgba(255,255,255,0.07)' }\n      : { bg: '#faf7f1', surface: '#f6f2ea', hair: '#ece6d9', ink: '#1a1a1c', muted: '#6f6c65', faint: '#8c877d', stmt: '#4d493f', menuhover: 'rgba(120,113,98,0.10)' };\n    root.style.setProperty('--bg', P.bg);\n    root.style.setProperty('--surface', P.surface);\n    root.style.setProperty('--hair', P.hair);\n    root.style.setProperty('--ink', P.ink);\n    root.style.setProperty('--muted', P.muted);\n    root.style.setProperty('--faint', P.faint);\n    root.style.setProperty('--stmt', P.stmt);\n    root.style.setProperty('--menuhover', P.menuhover);\n    root.style.setProperty('--bg', P.bg);\n    if (document.body) document.body.style.background = P.bg;\n  }\n\n  toggleMode() {\n    const m = this.state.mode === 'dark' ? 'light' : 'dark';\n    try { localStorage.setItem('otero-mode', m); } catch (e) {}\n    this.setState({ mode: m });\n  }\n\n  toggleChat() { this.setState({ chatOpen: !this.state.chatOpen }); }\n  closeChat() { this.setState({ chatOpen: false }); }\n\n  buildCorpus() {\n    const D = (typeof window !== 'undefined' && window.__OTERO_DATA) || {};\n    const P = D.PROFILE || {};\n    const groups = [\n      ['Publications', D.PUBLICATIONS],\n      ['Submitted / under review', D.SUBMITTED],\n      ['Working papers', D.OTHER_WP],\n      ['Work in progress', D.IN_PROGRESS],\n      ['Other writing', D.OTHER_WRITING],\n    ];\n    let s = \"You are the research assistant on the academic website of \" + (P.name || 'Sebasti\\u00e1n Otero') + ', ' + (P.role || '') + ' at ' + (P.institution || '') + \". Your job: answer visitors' questions about his research, papers, methods, and academic background using ONLY the information below.\\n\\nVOICE: lightly funny and dryly sarcastic — think a sharp grad student who genuinely loves this work but refuses to take itself too seriously. A wry aside or a deadpan one-liner is welcome. But: accuracy and substance come FIRST, the joke second. Never sacrifice a correct answer for a punchline, never be mean or snarky about Sebasti\\u00e1n or his coauthors, and don't force a joke when a straight answer is better. If you don't know something, admit it with a little self-aware humor and suggest emailing \" + (P.email || '') + \". Never invent papers, coauthors, numbers, or findings — making things up is the one thing that isn't funny. Keep answers to a few tight sentences unless asked to go deeper. Refer to him as \\\"Sebasti\\u00e1n\\\" in the third person.\\n\\n\";\n    s += 'BACKGROUND: ' + (P.bio1 || '') + ' ' + (P.bio2 || '') + '\\n\\n';\n    groups.forEach(function (g) {\n      var list = g[1];\n      if (!list || !list.length) return;\n      s += '=== ' + g[0].toUpperCase() + ' ===\\n';\n      list.forEach(function (p) {\n        var auth = (p.authors || []).map(function (a) { return a.name; }).filter(Boolean).join(', ');\n        var jr = p.journal ? (p.journal.name + (p.journal.rest || '')) : (p.status ? [p.status.date, p.status.text, p.status.journal, p.status.award].filter(Boolean).join(' ') : '');\n        s += '\\u2022 ' + p.title;\n        if (auth) s += ' (with ' + auth + ')';\n        if (jr) s += ' \\u2014 ' + jr;\n        s += '\\n';\n        if (p.abstract) s += '  Abstract: ' + p.abstract + '\\n';\n      });\n      s += '\\n';\n    });\n    if (D.RESEARCH_NOTES) s += D.RESEARCH_NOTES + '\\n';\n    return s;\n  }\n\n  async sendChat(text) {\n    text = (text || '').trim();\n    if (!text || this.state.chatLoading) return;\n    const visible = this.state.chatMessages.concat([{ role: 'user', content: text }]);\n    this.setState({ chatMessages: visible, chatLoading: true, chatError: false });\n    if (this._input) this._input.value = '';\n    try {\n      const reply = await this.runCompletion(visible);\n      this.setState({ chatMessages: this.state.chatMessages.concat([{ role: 'assistant', content: (reply || '').trim() || \"Sorry, I didn't catch that \\u2014 could you rephrase?\" }]), chatLoading: false });\n    } catch (e) {\n      this.handleChatError(e);\n    }\n  }\n\n  async runCompletion(visible) {\n    const corpus = this.buildCorpus();\n    const convo = visible.filter(function (m) { return m.role === 'user' || m.role === 'assistant'; }).map(function (m) { return { role: m.role, content: m.content }; });\n    // Live backend endpoint (Cloudflare Worker holding the API key). Empty = not wired up yet.\n    const ENDPOINT = 'https://otero-bot.seb-otero.worke Mind trying again?\"\n        : \"Something hiccuped reaching the assistant. Want to try again?\";\n      this.setState({ chatMessages: this.state.chatMessages.concat([{ role: 'assistant', content: note }]), chatLoading: false, chatError: true });\n    }\n  }\n\n  retryLast() {\n    if (this.state.chatLoading) return;\n    const msgs = this.state.chatMessages.slice();\n    if (msgs.length && msgs[msgs.length - 1].role === 'assistant') msgs.pop();\n    if (!msgs.length || msgs[msgs.length - 1].role !== 'user') return;\n    this.setState({ chatMessages: msgs, chatLoading: true, chatError: false });\n    const self = this;\n    this.runCompletion(msgs).then(function (reply) {\n      self.setState({ chatMessages: self.state.chatMessages.concat([{ role: 'assistant', content: (reply || '').trim() || \"Sorry, I didn't catch that \\u2014 could you rephrase?\" }]), chatLoading: false });\n    }).catch(function (e) { self.handleChatError(e); });\n  }\n\n  attachSpy() {\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    const ids = ['publications', 'working-papers', 'in-progress', 'other-writing'];\n    const onScroll = () => {\n      const line = 140;\n      const vh = window.innerHeight;\n      let cur = ids[0];\n      for (const id of ids) {\n        const el = document.getElementById(id);\n        if (el && el.getBoundingClientRect().top <= line) cur = id;\n      }\n      const atBottom = window.scrollY + vh >= document.documentElement.scrollHeight - 6;\n      if (atBottom) {\n        for (const id of ids) {\n          const el = document.getElementById(id);\n          if (el && el.getBoundingClientRect().top < vh - 80) cur = id;\n        }\n      }\n      if (cur !== this.state.activeId) this.setState({ activeId: cur });\n    };\n    this._onScroll = onScroll;\n    this._scrollBound = true;\n    window.addEventListener('scroll', onScroll, { passive: true });\n    onScroll();\n  }\n\n  toggle(id) {\n    this.setState((s) => ({ openIds: { .. tive ? 'true' : 'false',\n      };\n    });\n    const aboutActive = !active;\n    const pPos = this.props.mobilePhotoPos || 'top';\n    const pAlign = this.props.mobilePhotoAlign || 'left';\n    const pSize = this.props.mobilePhotoSize || 148;\n    const pMarginX = pAlign === 'center' ? 'auto' : '0';\n    const pTopGap = pPos === 'top' ? '0' : '8px';\n    const photoStyle = 'display:block;width:' + pSize + 'px;border-radius:9px;margin:' + pTopGap + ' ' + pMarginX + ' 34px ' + pMarginX + ';';\n    const mobNavItems = [{\n      href: '#maincontent',\n      label: 'About',\n      menuColor: aboutActive ? accentVar : 'var(--ink,#1a1a1c)',\n      menuWeight: aboutActive ? 600 : 500,\n    }].concat(navItems);\n    return {\n      sections,\n      navItems,\n      mobNavItems,\n      updated: this.props.updated || 'June 2026',\n      toggleMode: () => this.toggleMode(),\n      modeLabel: this.state.mode === 'dark' ? '☀ Light' : '☾ Dark',\n      isDark: this.state.mode === 'dark',\n      isLight: this.state.mode !== 'dark',\n      menuAria: this.state.menuOpen ? 'true' : 'false',\n      menuOpacity: this.state.menuOpen ? 1 : 0,\n      menuTransform: this.state.menuOpen ? 'translateY(0) scale(1)' : 'translateY(-8px) scale(0.96)',\n      menuPointer: this.state.menuOpen ? 'auto' : 'none',\n      line1: this.state.menuOpen ? 'translateY(7px) rotate(45deg)' : 'none',\n      line2op: this.state.menuOpen ? 0 : 1,\n      line3: this.state.menuOpen ? 'translateY(-7px) rotate(-45deg)' : 'none',\n      toggleMenu: () => this.toggleMenu(),\n      closeMenu: () => this.closeMenu(),\n      emailLabel: this.state.copied ? 'Copied ✓' : 'so2699@columbia.edu',\n      emailColor: this.state.copied ? accentVar : '',\n      photoStyle,\n      photoTop: pPos === 'top',\n      photoAboveEmail: pPos === 'above email',\n      copyEmail: () => this.copyEmail(),\n      chatOpen: this.state.chatOpen,\n      chatPanelDisplay: this.state.chatOpen ? 'flex' : 'none',\n      toggleChat: () => this.toggle
